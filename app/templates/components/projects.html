<section id="projects" class="projects">
    <div class="container">

        <div class="section-header" style="font-size: 3rem;">
            <h2>Projects</h2>
        </div>

        <div class="projects-search">
        <input
            type="text"
            id="projects-search"
            placeholder="Busca por categoria o tecnología (e.g. machine learning, pytorch)"
            >
            </div>

        <div class="projects-grid">
            {% for project in projects %}

            <article
                class="project-card"
                data-search="
                    {{ project.name }}
                    {{ project.project_type }}
                    {{ project.description }}
                    {{ project.technologies | join(' ') }}
                "
            >

                <h3 class="project-title">
                    {{ project.name }}
                </h3>

                <p class="project-type">
                    {{ project.project_type }}
                </p>

                <p class="project-description">
                    {{ project.description }}
                </p>

                <div class="project-tech">
                    {% for tech in project.technologies %}
                    <span class="tech-badge">{{ tech }}</span>
                    {% endfor %}
                </div>

                <div class="project-links">

                    <a href="{{ project.app_url }}" target="_blank" rel="noopener noreferrer">
                        Open App
                    </a>

                    <a href="{{ project.article_url }}" target="_blank" rel="noopener noreferrer">
                        Documentation
                    </a>

                    <a href="{{ project.github_url }}" target="_blank" rel="noopener noreferrer">
                        GitHub
                    </a>

                    {% if project.api_docs_url %}
                    <a href="{{ project.api_docs_url }}" target="_blank" rel="noopener noreferrer">
                        API Docs
                    </a>
                    {% endif %}

                </div>

            </article>

            {% endfor %}
        </div>

    </div>
</section>
