<section id="vps-info" class="vps-info">
    <div class="container">

        <div class="section-header">
            <h2>Infraestructura del VPS</h2>
        </div>

        <div class="vps-grid">

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/os.svg') }}" alt="Sistema Operativo">
                <span class="label">Sistema Operativo</span>
                <span class="value">Ubuntu 24.04 LTS</span>
            </div>

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/cpu.svg') }}" alt="CPU">
                <span class="label">CPU</span>
                <span class="value">4 vCPU</span>
            </div>

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/ram.svg') }}" alt="RAM">
                <span class="label">RAM</span>
                <span class="value">8 GB</span>
            </div>

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/disk.svg') }}" alt="Disco">
                <span class="label">Disco</span>
                <span class="value">160 GB SSD</span>
            </div>

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/ip.svg') }}" alt="IP Pública">
                <span class="label">IP Pública</span>
                <span class="value">186.xxx.xxx.xxx</span>
            </div>

            <div class="vps-card">
                <img src="{{ url_for('static', filename='img/icons/domain.svg') }}" alt="Dominio">
                <span class="label">Dominio</span>
                <span class="value">projects.fernandorioseco.es</span>
            </div>

        </div>
    </div>
</section>
